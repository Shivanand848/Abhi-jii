<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Abhi jiii — Everyday Store</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,500;0,600;0,700;1,500&family=Work+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  /* ============================================================
     DESIGN TOKENS — "bazaar receipt" aesthetic: warm paper stock,
     stamped badges, rust/olive/ochre palette. No generic blue.
     ============================================================ */
  :root{
    --cream:#F6EEDF;      /* page background, unbleached paper */
    --paper:#FFFBF3;      /* card surface, brighter paper */
    --ink:#2C2013;        /* near-black warm brown, main text */
    --ink-soft:#5B4C3A;   /* secondary text */
    --olive:#4B5A32;      /* primary accent — buttons */
    --olive-dark:#394427;
    --rust:#A6472A;       /* secondary accent — price, stamps */
    --ochre:#C8912F;      /* highlight accent */
    --line:#E3D6BC;       /* hairline borders */
    --line-strong:#D2C09A;
    --shadow: 0 6px 18px rgba(44,32,19,0.10);
    --radius: 10px;
    --font-head: 'Fraunces', Georgia, serif;
    --font-body: 'Work Sans', -apple-system, sans-serif;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    font-family: var(--font-body);
    background:var(--cream);
    color:var(--ink);
    line-height:1.5;
    -webkit-font-smoothing:antialiased;
  }
  h1,h2,h3,h4{ font-family:var(--font-head); font-weight:600; margin:0 0 .4em; color:var(--ink); }
  a{ color:inherit; text-decoration:none; }
  img{ max-width:100%; display:block; }
  button{ font-family:var(--font-body); cursor:pointer; }
  .container{ max-width:1180px; margin:0 auto; padding:0 24px; }

  a:focus-visible, button:focus-visible, input:focus-visible, textarea:focus-visible, select:focus-visible{
    outline:3px solid var(--ochre); outline-offset:2px;
  }
  @media (prefers-reduced-motion: reduce){ *{ transition:none !important; animation:none !important; } }

  /* ---------------- NAVBAR ---------------- */
  .navbar{ position:sticky; top:0; z-index:50; background:var(--paper); border-bottom:2px solid var(--ink); box-shadow:var(--shadow); }
  .nav-inner{ display:flex; align-items:center; justify-content:space-between; padding:14px 24px; max-width:1180px; margin:0 auto; }
  .brand{ display:flex; flex-direction:column; cursor:pointer; }
  .brand .name{ font-family:var(--font-head); font-size:1.5rem; font-weight:700; letter-spacing:.3px; }
  .brand .tag{ font-size:.72rem; color:var(--ink-soft); letter-spacing:1.5px; text-transform:uppercase; }
  .nav-links{ display:flex; align-items:center; gap:22px; }
  .nav-link{ font-weight:600; font-size:.95rem; padding:8px 4px; border-bottom:2px solid transparent; }
  .nav-link:hover{ border-bottom-color:var(--rust); }
  .cart-pill{ position:relative; display:flex; align-items:center; gap:8px; background:var(--olive); color:var(--paper); padding:9px 16px; border-radius:999px; font-weight:600; font-size:.9rem; }
  .cart-pill:hover{ background:var(--olive-dark); }
  .cart-count{ background:var(--rust); color:#fff; font-size:.72rem; font-weight:700; min-width:20px; height:20px; border-radius:50%; display:flex; align-items:center; justify-content:center; padding:0 4px; }

  /* ---------------- HERO ---------------- */
  .hero{ position:relative; min-height:420px; display:flex; align-items:center; background-color:var(--olive-dark); background-size:cover; background-position:center; color:#fff; overflow:hidden; border-bottom:2px solid var(--ink); }
  .hero-inner{ max-width:640px; padding:70px 24px; margin:0 24px; }
  .hero-eyebrow{ display:inline-block; font-size:.75rem; letter-spacing:2px; text-transform:uppercase; background:var(--ochre); color:var(--ink); padding:5px 12px; border-radius:4px; margin-bottom:16px; font-weight:700; transform:rotate(-2deg); }
  .hero h1{ color:#fff; font-size:clamp(2.1rem, 5vw, 3.2rem); line-height:1.08; margin-bottom:14px; }
  .hero p{ font-size:1.05rem; color:#F1E7D3; max-width:480px; margin-bottom:26px; }
  .btn{ display:inline-flex; align-items:center; gap:8px; border:none; padding:13px 26px; border-radius:6px; font-weight:700; font-size:.95rem; background:var(--rust); color:#fff; box-shadow:var(--shadow); transition:transform .15s ease, background .15s ease; }
  .btn:hover{ background:#8a3a21; transform:translateY(-2px); }
  .btn.secondary{ background:transparent; color:#fff; border:2px solid #fff; }
  .btn.secondary:hover{ background:rgba(255,255,255,.15); }
  .btn.olive{ background:var(--olive); }
  .btn.olive:hover{ background:var(--olive-dark); }
  .btn.ghost{ background:var(--paper); color:var(--ink); border:2px solid var(--ink); box-shadow:none; }
  .btn.ghost:hover{ background:var(--cream); }
  .btn:disabled{ opacity:.55; cursor:not-allowed; transform:none; }

  /* ---------------- SECTIONS ---------------- */
  .section{ padding:56px 0; }
  .section-head{ display:flex; align-items:baseline; justify-content:space-between; margin-bottom:26px; flex-wrap:wrap; gap:12px; }
  .section-head h2{ font-size:1.8rem; }
  .divider-stamp{ display:inline-block; font-size:.7rem; letter-spacing:2px; text-transform:uppercase; color:var(--rust); border:1.5px dashed var(--rust); padding:4px 10px; border-radius:4px; font-weight:700; }

  /* ---------------- CATEGORY FILTER ---------------- */
  .filters{ display:flex; gap:10px; flex-wrap:wrap; margin-bottom:30px; }
  .filter-chip{ background:var(--paper); border:1.5px solid var(--line-strong); color:var(--ink-soft); padding:8px 16px; border-radius:999px; font-weight:600; font-size:.86rem; }
  .filter-chip:hover{ border-color:var(--rust); color:var(--rust); }
  .filter-chip.active{ background:var(--ink); color:var(--paper); border-color:var(--ink); }

  /* ---------------- PRODUCT GRID / CARDS ---------------- */
  .grid{ display:grid; grid-template-columns:repeat(auto-fill, minmax(240px, 1fr)); gap:24px; }
  .card{ background:var(--paper); border:1.5px solid var(--line); border-radius:var(--radius); overflow:hidden; box-shadow:var(--shadow); display:flex; flex-direction:column; transition:transform .2s ease, box-shadow .2s ease; }
  .card:hover{ transform:translateY(-5px); box-shadow:0 14px 26px rgba(44,32,19,.16); }
  .card-media{ position:relative; aspect-ratio:4/3; background:var(--cream); overflow:hidden; cursor:pointer; }
  .card-media img{ width:100%; height:100%; object-fit:cover; transition:transform .35s ease; }
  .card:hover .card-media img{ transform:scale(1.06); }
  .stock-badge{ position:absolute; top:10px; left:10px; background:var(--ink); color:var(--paper); font-size:.68rem; font-weight:700; padding:4px 9px; border-radius:4px; letter-spacing:.5px; }
  .stock-badge.low{ background:var(--rust); }
  .stock-badge.out{ background:#8a8a8a; }
  .card-body{ padding:16px 16px 18px; display:flex; flex-direction:column; gap:8px; flex:1; }
  .card-cat{ font-size:.7rem; text-transform:uppercase; letter-spacing:1.5px; color:var(--ochre); font-weight:700; }
  .card-title{ font-family:var(--font-head); font-size:1.15rem; cursor:pointer; }
  .card-title:hover{ color:var(--rust); }
  .card-desc{ font-size:.86rem; color:var(--ink-soft); flex:1; }
  .card-footer{ display:flex; align-items:center; justify-content:space-between; margin-top:6px; gap:10px; }
  .price{ font-family:var(--font-head); font-weight:700; font-size:1.2rem; color:var(--rust); }
  .add-btn{ background:var(--olive); color:#fff; border:none; padding:9px 14px; border-radius:6px; font-weight:700; font-size:.82rem; white-space:nowrap; }
  .add-btn:hover{ background:var(--olive-dark); }
  .add-btn.in-cart{ background:var(--paper); color:var(--olive-dark); border:2px solid var(--olive); }
  .add-btn.in-cart:hover{ background:var(--cream); }

  .empty-state{ text-align:center; padding:60px 20px; color:var(--ink-soft); }
  .empty-state h3{ margin-bottom:8px; }

  /* ---------------- PRODUCT PAGE ---------------- */
  .breadcrumb{ font-size:.85rem; color:var(--ink-soft); margin-bottom:22px; }
  .breadcrumb a:hover{ color:var(--rust); }
  .product-layout{ display:grid; grid-template-columns:1fr 1fr; gap:44px; }
  @media (max-width:820px){ .product-layout{ grid-template-columns:1fr; } }
  .gallery-main{ aspect-ratio:4/3; background:var(--paper); border:1.5px solid var(--line); border-radius:var(--radius); overflow:hidden; margin-bottom:12px; }
  .gallery-main img{ width:100%; height:100%; object-fit:cover; }
  .gallery-thumbs{ display:flex; gap:10px; flex-wrap:wrap; }
  .thumb{ width:70px; height:70px; border-radius:6px; overflow:hidden; border:2px solid var(--line); cursor:pointer; flex-shrink:0; }
  .thumb.active{ border-color:var(--rust); }
  .thumb img{ width:100%; height:100%; object-fit:cover; }
  .pd-cat{ font-size:.75rem; text-transform:uppercase; letter-spacing:2px; color:var(--ochre); font-weight:700; margin-bottom:6px; }
  .pd-title{ font-size:2rem; margin-bottom:10px; }
  .pd-price{ font-family:var(--font-head); font-size:1.8rem; color:var(--rust); font-weight:700; margin-bottom:16px; }
  .pd-desc{ color:var(--ink-soft); margin-bottom:22px; }
  .pd-stock{ font-size:.85rem; font-weight:600; margin-bottom:22px; }
  .pd-stock.in{ color:var(--olive-dark); }
  .pd-stock.low{ color:var(--rust); }
  .pd-stock.out{ color:#8a8a8a; }
  .qty-row{ display:flex; align-items:center; gap:16px; margin-bottom:22px; }
  .qty-selector{ display:flex; align-items:center; border:1.5px solid var(--line-strong); border-radius:8px; overflow:hidden; }
  .qty-selector button{ background:var(--cream); border:none; width:38px; height:38px; font-size:1.1rem; font-weight:700; }
  .qty-selector button:hover{ background:var(--line); }
  .qty-selector input{ width:48px; text-align:center; border:none; border-left:1.5px solid var(--line-strong); border-right:1.5px solid var(--line-strong); height:38px; font-size:1rem; font-family:var(--font-body); }
  .pd-actions{ display:flex; gap:12px; flex-wrap:wrap; }
  .related-grid{ margin-top:14px; }

  /* ---------------- CART PAGE ---------------- */
  .cart-layout{ display:grid; grid-template-columns:1.6fr 1fr; gap:34px; align-items:start; }
  @media (max-width:860px){ .cart-layout{ grid-template-columns:1fr; } }
  .cart-item{ display:grid; grid-template-columns:86px 1fr auto auto; gap:16px; align-items:center; background:var(--paper); border:1.5px solid var(--line); border-radius:var(--radius); padding:14px; margin-bottom:14px; }
  @media (max-width:520px){ .cart-item{ grid-template-columns:64px 1fr; grid-template-rows:auto auto; } }
  .cart-item img{ width:86px; height:86px; object-fit:cover; border-radius:6px; }
  .cart-item-name{ font-family:var(--font-head); font-size:1.05rem; margin-bottom:4px; cursor:pointer; }
  .cart-item-name:hover{ color:var(--rust); }
  .cart-item-price{ color:var(--ink-soft); font-size:.85rem; }
  .remove-link{ color:var(--rust); font-size:.8rem; font-weight:600; margin-top:6px; display:inline-block; }
  .remove-link:hover{ text-decoration:underline; }
  .cart-item-total{ font-weight:700; font-family:var(--font-head); font-size:1.05rem; text-align:right; }

  .summary-card{ background:var(--paper); border:1.5px solid var(--ink); border-radius:var(--radius); padding:24px; position:relative; }
  .summary-card::before{ content:"RECEIPT"; position:absolute; top:-11px; left:20px; background:var(--ochre); color:var(--ink); font-size:.68rem; font-weight:800; letter-spacing:2px; padding:3px 10px; border-radius:3px; transform:rotate(-2deg); }
  .summary-row{ display:flex; justify-content:space-between; font-size:.92rem; padding:8px 0; color:var(--ink-soft); border-bottom:1px dashed var(--line-strong); }
  .summary-row.total{ color:var(--ink); font-weight:700; font-size:1.15rem; border-bottom:none; padding-top:14px; }
  .summary-row.total .val{ color:var(--rust); font-family:var(--font-head); }

  /* ---------------- CHECKOUT ---------------- */
  .checkout-layout{ display:grid; grid-template-columns:1.3fr 1fr; gap:34px; align-items:start; }
  @media (max-width:860px){ .checkout-layout{ grid-template-columns:1fr; } }
  .form-card{ background:var(--paper); border:1.5px solid var(--line); border-radius:var(--radius); padding:26px; }
  .field{ margin-bottom:18px; }
  .field label{ display:block; font-weight:600; font-size:.88rem; margin-bottom:6px; }
  .field input, .field textarea{ width:100%; padding:11px 13px; border:1.5px solid var(--line-strong); border-radius:7px; font-family:var(--font-body); font-size:.95rem; background:var(--cream); color:var(--ink); }
  .field input:focus, .field textarea:focus{ background:#fff; }
  .field textarea{ resize:vertical; min-height:80px; }
  .mini-line-item{ display:flex; justify-content:space-between; font-size:.85rem; padding:6px 0; color:var(--ink-soft); }

  .stamp-success{ text-align:center; padding:60px 20px; }
  .stamp-success .stamp{ display:inline-block; border:4px solid var(--olive); color:var(--olive); font-family:var(--font-head); font-weight:800; font-size:1.6rem; padding:16px 30px; border-radius:10px; transform:rotate(-4deg); margin-bottom:22px; letter-spacing:2px; }

  /* ---------------- FOOTER ---------------- */
  footer{ border-top:2px solid var(--ink); background:var(--paper); padding:30px 0; margin-top:40px; }
  footer .container{ display:flex; justify-content:space-between; flex-wrap:wrap; gap:10px; font-size:.85rem; color:var(--ink-soft); }

  @media (max-width:600px){
    .nav-links{ gap:12px; }
    .brand .tag{ display:none; }
    .hero-inner{ padding:50px 20px; }
  }
</style>
</head>
<body>

<div id="app"></div>

<script>
/* ============================================================
   CONFIG — edit store details here
   ============================================================ */
const CONFIG = {
  STORE_NAME: "Abhi jiii",
  TAGLINE: "Your everyday neighbourhood store",
  CURRENCY: "₹",
  // STEP 1: Formspree par account banao / login karo with: masterbabu@gmail.com
  // STEP 2: New Form banao, jo endpoint mile use neeche paste karo.
  // Example: "https://formspree.io/f/abcdwxyz"
  FORMSPREE_URL: "https://formspree.io/f/YOUR_FORM_ID",
  ORDER_EMAIL: "masterbabu@gmail.com",
  // NOTE: the hero image link you supplied was a webpage (a magnific.com
  // preview page), not a direct image file, so it can't be loaded as an
  // <img>/background-image. Swap this for any direct .jpg/.png URL you like.
  HERO_IMAGE: "https://images.unsplash.com/photo-1483985988355-763728e1935b?q=80&w=1600&auto=format&fit=crop"
};

/* ============================================================
   PRODUCTS — edit this array to add/remove/update products
   ============================================================ */
const PRODUCTS = [
  {
    id: "p1",
    name: "Realme i3 Laptop",
    price: 28999,
    category: "Electronics",
    description: "A reliable everyday laptop from Realme's i3 series — smooth for browsing, office work, and streaming. Slim build, solid battery life, and a crisp display make it a great starter machine for students and professionals alike.",
    images: [
      "https://i.ibb.co/cKHSbN99/IMG-20260705-222729.jpg"
    ],
    stock: 6
  },
  {
    id: "p2",
    name: "Usha Speed Fan",
    price: 1899,
    category: "Home Appliances",
    description: "The Usha Speed table fan delivers powerful air circulation with a sturdy motor built to last. Multiple speed settings and a compact design make it perfect for home, office, or shop counters through every season.",
    images: [
      "https://i.ibb.co/k2z8mBwc/IMG-20260705-222741.jpg"
    ],
    stock: 14
  }
];

/* ============================================================
   CART — persisted to localStorage under "neo_cart"
   shape: [{ id, qty }]
   ============================================================ */
const CART_KEY = "neo_cart";
function getCart(){
  try{ return JSON.parse(localStorage.getItem(CART_KEY)) || []; }
  catch(e){ return []; }
}
function saveCart(cart){
  localStorage.setItem(CART_KEY, JSON.stringify(cart));
  updateCartBadge();
}
function cartCount(){
  return getCart().reduce((sum, i) => sum + i.qty, 0);
}
function addToCart(id, qty = 1){
  const cart = getCart();
  const existing = cart.find(i => i.id === id);
  const product = PRODUCTS.find(p => p.id === id);
  const max = product ? product.stock : 99;
  if (existing){
    existing.qty = Math.min(existing.qty + qty, max);
  } else {
    cart.push({ id, qty: Math.min(qty, max) });
  }
  saveCart(cart);
}
function setQty(id, qty){
  let cart = getCart();
  const product = PRODUCTS.find(p => p.id === id);
  const max = product ? product.stock : 99;
  qty = Math.max(1, Math.min(qty, max));
  const item = cart.find(i => i.id === id);
  if (item){ item.qty = qty; saveCart(cart); }
  return qty;
}
function removeFromCart(id){
  const cart = getCart().filter(i => i.id !== id);
  saveCart(cart);
}
function isInCart(id){
  return getCart().some(i => i.id === id);
}
function clearCart(){ saveCart([]); }

function fmt(n){
  return CONFIG.CURRENCY + Number(n).toLocaleString("en-IN");
}

function updateCartBadge(){
  const el = document.getElementById("cart-count");
  if (el) el.textContent = cartCount();
}

/* ============================================================
   ROUTER
   ============================================================ */
function currentRoute(){
  const hash = window.location.hash.slice(1) || "/";
  const parts = hash.split("/").filter(Boolean);
  if (parts.length === 0) return { name: "home" };
  if (parts[0] === "product" && parts[1]) return { name: "product", id: parts[1] };
  if (parts[0] === "cart") return { name: "cart" };
  if (parts[0] === "checkout") return { name: "checkout" };
  return { name: "home" };
}
function navigate(hash){ window.location.hash = hash; }

window.addEventListener("hashchange", render);
window.addEventListener("DOMContentLoaded", render);

function render(){
  const route = currentRoute();
  window.scrollTo(0, 0);
  const app = document.getElementById("app");
  app.innerHTML = shellHTML();
  updateCartBadge();

  if (route.name === "home") renderHome();
  else if (route.name === "product") renderProduct(route.id);
  else if (route.name === "cart") renderCart();
  else if (route.name === "checkout") renderCheckout();
}

/* ============================================================
   SHELL — navbar + footer wrapper, page content injected into #page
   ============================================================ */
function shellHTML(){
  return `
    <header class="navbar">
      <div class="nav-inner">
        <div class="brand" onclick="navigate('/')">
          <span class="name">${CONFIG.STORE_NAME}</span>
          <span class="tag">${CONFIG.TAGLINE}</span>
        </div>
        <nav class="nav-links">
          <a class="nav-link" href="#/">Home</a>
          <a class="nav-link cart-pill" href="#/cart">
            🛒 Cart <span class="cart-count" id="cart-count">0</span>
          </a>
        </nav>
      </div>
    </header>
    <main id="page"></main>
    <footer>
      <div class="container">
        <span>© ${new Date().getFullYear()} ${CONFIG.STORE_NAME}. All rights reserved.</span>
        <span>Made with care, one order at a time.</span>
      </div>
    </footer>
  `;
}

/* ============================================================
   HOME PAGE
   ============================================================ */
let activeCategory = "All";

function renderHome(){
  const page = document.getElementById("page");
  const categories = ["All", ...new Set(PRODUCTS.map(p => p.category))];

  page.innerHTML = `
    <section class="hero" id="hero-section">
      <div class="hero-inner">
        <span class="hero-eyebrow">Fresh stock, honest prices</span>
        <h1>Everything your day needs, from one trusted shop.</h1>
        <p>Browse laptops, appliances, and everyday essentials — hand-picked and ready to ship from ${CONFIG.STORE_NAME}.</p>
        <a href="#products" class="btn">Shop the collection ↓</a>
      </div>
    </section>

    <section class="section container" id="products">
      <div class="section-head">
        <h2>All products</h2>
        <span class="divider-stamp">${PRODUCTS.length} items in stock</span>
      </div>
      <div class="filters" id="filters"></div>
      <div class="grid" id="product-grid"></div>
    </section>
  `;

  document.getElementById("hero-section").style.backgroundImage =
    `linear-gradient(115deg, rgba(44,32,19,.72) 10%, rgba(44,32,19,.30) 55%, rgba(44,32,19,.55) 100%), url('${CONFIG.HERO_IMAGE}')`;

  const filterWrap = document.getElementById("filters");
  filterWrap.innerHTML = categories.map(c =>
    `<button class="filter-chip ${c === activeCategory ? 'active' : ''}" data-cat="${c}">${c}</button>`
  ).join("");
  filterWrap.querySelectorAll(".filter-chip").forEach(btn => {
    btn.addEventListener("click", () => {
      activeCategory = btn.dataset.cat;
      renderHome();
    });
  });

  renderProductGrid(
    document.getElementById("product-grid"),
    activeCategory === "All" ? PRODUCTS : PRODUCTS.filter(p => p.category === activeCategory)
  );
}

function renderProductGrid(container, products){
  if (products.length === 0){
    container.innerHTML = `<div class="empty-state"><h3>No products here yet</h3><p>Try a different category.</p></div>`;
    return;
  }
  container.innerHTML = products.map(p => productCardHTML(p)).join("");
  container.querySelectorAll("[data-open]").forEach(el => {
    el.addEventListener("click", () => navigate('/product/' + el.dataset.open));
  });
  container.querySelectorAll("[data-add]").forEach(btn => {
    btn.addEventListener("click", (e) => {
      e.stopPropagation();
      addToCart(btn.dataset.add, 1);
      btn.textContent = "In Cart ✓";
      btn.classList.add("in-cart");
    });
  });
}

function productCardHTML(p){
  const inCart = isInCart(p.id);
  const stockLabel = p.stock === 0 ? { cls: "out", text: "Out of stock" }
                    : p.stock <= 3 ? { cls: "low", text: `Only ${p.stock} left` }
                    : { cls: "", text: "In stock" };
  return `
    <article class="card">
      <div class="card-media" data-open="${p.id}">
        <img src="${p.images[0]}" alt="${p.name}">
        <span class="stock-badge ${stockLabel.cls}">${stockLabel.text}</span>
      </div>
      <div class="card-body">
        <span class="card-cat">${p.category}</span>
        <h3 class="card-title" data-open="${p.id}">${p.name}</h3>
        <p class="card-desc">${truncate(p.description, 70)}</p>
        <div class="card-footer">
          <span class="price">${fmt(p.price)}</span>
          <button class="add-btn ${inCart ? 'in-cart' : ''}" data-add="${p.id}" ${p.stock === 0 ? 'disabled' : ''}>
            ${inCart ? 'In Cart ✓' : (p.stock === 0 ? 'Sold out' : 'Add to Cart')}
          </button>
        </div>
      </div>
    </article>
  `;
}

function truncate(str, n){
  return str.length > n ? str.slice(0, n).trim() + "…" : str;
}

/* ============================================================
   PRODUCT PAGE
   ============================================================ */
function renderProduct(id){
  const page = document.getElementById("page");
  const product = PRODUCTS.find(p => p.id === id);

  if (!product){
    page.innerHTML = `<div class="container section"><div class="empty-state"><h3>Product not found</h3><a href="#/" class="btn olive">Back to shop</a></div></div>`;
    return;
  }

  const related = PRODUCTS.filter(p => p.category === product.category && p.id !== product.id);
  const stockLabel = product.stock === 0 ? { cls: "out", text: "Out of stock" }
                    : product.stock <= 3 ? { cls: "low", text: `Only ${product.stock} left in stock` }
                    : { cls: "in", text: "In stock, ready to ship" };

  page.innerHTML = `
    <div class="container section">
      <div class="breadcrumb"><a href="#/">Home</a> &nbsp;/&nbsp; ${product.category} &nbsp;/&nbsp; ${product.name}</div>
      <div class="product-layout">
        <div>
          <div class="gallery-main"><img id="main-image" src="${product.images[0]}" alt="${product.name}"></div>
          <div class="gallery-thumbs" id="thumbs">
            ${product.images.map((img, i) => `<div class="thumb ${i===0?'active':''}" data-img="${img}"><img src="${img}" alt="${product.name} view ${i+1}"></div>`).join("")}
          </div>
        </div>
        <div>
          <div class="pd-cat">${product.category}</div>
          <h1 class="pd-title">${product.name}</h1>
          <div class="pd-price">${fmt(product.price)}</div>
          <p class="pd-desc">${product.description}</p>
          <div class="pd-stock ${stockLabel.cls}">● ${stockLabel.text}</div>
          <div class="qty-row">
            <div class="qty-selector">
              <button id="qty-minus" type="button">−</button>
              <input id="qty-input" type="number" min="1" max="${product.stock}" value="1">
              <button id="qty-plus" type="button">+</button>
            </div>
          </div>
          <div class="pd-actions">
            <button class="btn olive" id="pd-add" ${product.stock === 0 ? 'disabled' : ''}>
              ${isInCart(product.id) ? 'In Cart ✓ — Add more' : 'Add to Cart'}
            </button>
            <a href="#/cart" class="btn ghost">View Cart</a>
          </div>
        </div>
      </div>

      ${related.length ? `
        <div class="section">
          <div class="section-head"><h2>You may also like</h2></div>
          <div class="grid related-grid" id="related-grid"></div>
        </div>
      ` : ""}
    </div>
  `;

  document.getElementById("thumbs").querySelectorAll(".thumb").forEach(t => {
    t.addEventListener("click", () => {
      document.getElementById("main-image").src = t.dataset.img;
      document.querySelectorAll(".thumb").forEach(x => x.classList.remove("active"));
      t.classList.add("active");
    });
  });

  const qtyInput = document.getElementById("qty-input");
  document.getElementById("qty-minus").addEventListener("click", () => {
    qtyInput.value = Math.max(1, parseInt(qtyInput.value || 1) - 1);
  });
  document.getElementById("qty-plus").addEventListener("click", () => {
    qtyInput.value = Math.min(product.stock, parseInt(qtyInput.value || 1) + 1);
  });
  qtyInput.addEventListener("change", () => {
    let v = parseInt(qtyInput.value || 1);
    if (isNaN(v) || v < 1) v = 1;
    if (v > product.stock) v = product.stock;
    qtyInput.value = v;
  });

  document.getElementById("pd-add").addEventListener("click", (e) => {
    const qty = parseInt(qtyInput.value || 1);
    addToCart(product.id, qty);
    e.target.textContent = "In Cart ✓ — Add more";
  });

  if (related.length){
    renderProductGrid(document.getElementById("related-grid"), related);
  }
}

/* ============================================================
   CART PAGE
   ============================================================ */
function renderCart(){
  const page = document.getElementById("page");
  const cart = getCart();

  if (cart.length === 0){
    page.innerHTML = `
      <div class="container section">
        <div class="empty-state">
          <h3>Your cart is empty</h3>
          <p>Looks like you haven't added anything yet.</p>
          <a href="#/" class="btn olive">Browse products</a>
        </div>
      </div>
    `;
    return;
  }

  const lines = cart.map(item => {
    const p = PRODUCTS.find(pp => pp.id === item.id);
    if (!p) return null;
    return { ...item, product: p, lineTotal: p.price * item.qty };
  }).filter(Boolean);

  const subtotal = lines.reduce((sum, l) => sum + l.lineTotal, 0);

  page.innerHTML = `
    <div class="container section">
      <div class="section-head"><h2>Your Cart</h2><span class="divider-stamp">${cartCount()} item${cartCount()!==1?'s':''}</span></div>
      <div class="cart-layout">
        <div id="cart-items"></div>
        <div class="summary-card">
          <div class="summary-row"><span>Subtotal</span><span>${fmt(subtotal)}</span></div>
          <div class="summary-row"><span>Delivery</span><span>Calculated at checkout</span></div>
          <div class="summary-row total"><span>Total</span><span class="val">${fmt(subtotal)}</span></div>
          <a href="#/checkout" class="btn olive" style="width:100%; justify-content:center; margin-top:16px;">Proceed to Checkout</a>
        </div>
      </div>
    </div>
  `;

  const itemsWrap = document.getElementById("cart-items");
  itemsWrap.innerHTML = lines.map(l => `
    <div class="cart-item" data-id="${l.id}">
      <img src="${l.product.images[0]}" alt="${l.product.name}" data-open="${l.id}" style="cursor:pointer">
      <div>
        <div class="cart-item-name" data-open="${l.id}">${l.product.name}</div>
        <div class="cart-item-price">${fmt(l.product.price)} each</div>
        <a class="remove-link" data-remove="${l.id}">Remove</a>
      </div>
      <div class="qty-selector">
        <button data-minus="${l.id}" type="button">−</button>
        <input type="number" min="1" max="${l.product.stock}" value="${l.qty}" data-qtyinput="${l.id}">
        <button data-plus="${l.id}" type="button">+</button>
      </div>
      <div class="cart-item-total">${fmt(l.lineTotal)}</div>
    </div>
  `).join("");

  itemsWrap.querySelectorAll("[data-open]").forEach(el => {
    el.addEventListener("click", () => navigate('/product/' + el.dataset.open));
  });
  itemsWrap.querySelectorAll("[data-remove]").forEach(el => {
    el.addEventListener("click", () => { removeFromCart(el.dataset.remove); renderCart(); });
  });
  itemsWrap.querySelectorAll("[data-minus]").forEach(el => {
    el.addEventListener("click", () => {
      const cart = getCart();
      const item = cart.find(i => i.id === el.dataset.minus);
      if (item){ setQty(item.id, item.qty - 1); renderCart(); }
    });
  });
  itemsWrap.querySelectorAll("[data-plus]").forEach(el => {
    el.addEventListener("click", () => {
      const cart = getCart();
      const item = cart.find(i => i.id === el.dataset.plus);
      if (item){ setQty(item.id, item.qty + 1); renderCart(); }
    });
  });
  itemsWrap.querySelectorAll("[data-qtyinput]").forEach(el => {
    el.addEventListener("change", () => {
      const v = setQty(el.dataset.qtyinput, parseInt(el.value || 1));
      el.value = v;
      renderCart();
    });
  });
}

/* ============================================================
   CHECKOUT PAGE
   ============================================================ */
function renderCheckout(){
  const page = document.getElementById("page");
  const cart = getCart();

  if (cart.length === 0){
    page.innerHTML = `
      <div class="container section">
        <div class="empty-state">
          <h3>Nothing to check out</h3>
          <p>Add a few items to your cart first.</p>
          <a href="#/" class="btn olive">Browse products</a>
        </div>
      </div>
    `;
    return;
  }

  const lines = cart.map(item => {
    const p = PRODUCTS.find(pp => pp.id === item.id);
    return p ? { ...item, product: p, lineTotal: p.price * item.qty } : null;
  }).filter(Boolean);
  const subtotal = lines.reduce((sum, l) => sum + l.lineTotal, 0);

  page.innerHTML = `
    <div class="container section">
      <div class="section-head"><h2>Checkout</h2><span class="divider-stamp">Almost there</span></div>
      <div class="checkout-layout">
        <div class="form-card">
          <form id="checkout-form">
            <div class="field">
              <label for="cf-name">Full Name</label>
              <input id="cf-name" name="name" type="text" required placeholder="Your name">
            </div>
            <div class="field">
              <label for="cf-email">Email</label>
              <input id="cf-email" name="email" type="email" required placeholder="you@example.com">
            </div>
            <div class="field">
              <label for="cf-phone">Phone</label>
              <input id="cf-phone" name="phone" type="tel" required placeholder="10-digit mobile number">
            </div>
            <div class="field">
              <label for="cf-address">Delivery Address</label>
              <textarea id="cf-address" name="address" required placeholder="House no, street, city, pincode"></textarea>
            </div>
            <div class="field">
              <label for="cf-notes">Notes (optional)</label>
              <textarea id="cf-notes" name="notes" placeholder="Delivery instructions, gift note, etc."></textarea>
            </div>
            <button class="btn olive" type="submit" id="cf-submit" style="width:100%; justify-content:center;">
              Place Order — ${fmt(subtotal)}
            </button>
          </form>
        </div>
        <div class="summary-card">
          ${lines.map(l => `
            <div class="mini-line-item">
              <span>${l.product.name} × ${l.qty}</span>
              <span>${fmt(l.lineTotal)}</span>
            </div>
          `).join("")}
          <div class="summary-row total"><span>Total</span><span class="val">${fmt(subtotal)}</span></div>
        </div>
      </div>
    </div>
  `;

  document.getElementById("checkout-form").addEventListener("submit", async (e) => {
    e.preventDefault();
    const submitBtn = document.getElementById("cf-submit");
    submitBtn.disabled = true;
    submitBtn.textContent = "Placing order…";

    const form = e.target;
    const orderSummaryText = lines.map(l => `${l.product.name} x${l.qty} = ${fmt(l.lineTotal)}`).join("\n");

    const payload = {
      _subject: `New Order Received — ${CONFIG.STORE_NAME} — ${fmt(subtotal)}`,
      send_to: CONFIG.ORDER_EMAIL,

      customer_name: form.name.value,
      customer_email: form.email.value,
      customer_phone: form.phone.value,
      delivery_address: form.address.value,
      customer_notes: form.notes.value || "No notes",

      order_items: orderSummaryText,
      order_total: fmt(subtotal),
      order_date: new Date().toLocaleString("en-IN", { timeZone: "Asia/Kolkata" }),

      cart_full_detail: JSON.stringify(
        lines.map(l => ({
          product_id: l.id,
          product_name: l.product.name,
          quantity: l.qty,
          price_each: fmt(l.product.price),
          line_total: fmt(l.lineTotal)
        })),
        null,
        2
      )
    };

    try {
      if (CONFIG.FORMSPREE_URL.includes("YOUR_FORM_ID")){
        // Formspree not configured yet — simulate success so the flow can be tested.
        console.warn("Formspree URL not set in CONFIG — order was not actually sent anywhere.");
        await new Promise(r => setTimeout(r, 600));
      } else {
        const res = await fetch(CONFIG.FORMSPREE_URL, {
          method: "POST",
          headers: { "Content-Type": "application/json", "Accept": "application/json" },
          body: JSON.stringify(payload)
        });
        if (!res.ok) throw new Error("Formspree request failed");
      }
      showOrderSuccess();
    } catch (err){
      submitBtn.disabled = false;
      submitBtn.textContent = `Place Order — ${fmt(subtotal)}`;
      alert("Something went wrong sending your order. Please check your connection and try again.");
      console.error(err);
    }
  });
}

function showOrderSuccess(){
  clearCart();
  const page = document.getElementById("page");
  page.innerHTML = `
    <div class="container">
      <div class="stamp-success">
        <div class="stamp">ORDER CONFIRMED ✓</div>
        <h2>Thank you for shopping with ${CONFIG.STORE_NAME}!</h2>
        <p>We've received your order and will reach out shortly to confirm delivery details.</p>
        <p style="color:var(--ink-soft); font-size:.9rem;">Redirecting you to the home page in a few seconds…</p>
      </div>
    </div>
  `;
  setTimeout(() => { navigate('/'); }, 3000);
}
</script>
